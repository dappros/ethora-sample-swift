# Multi-tenant: switch from app A's user to app B's user (different
# baseUrl + appId + token + user) without restarting the host
# activity. Catches: store not flushed between contexts, XMPP client
# not torn down (mod_ethora rejects with "wrong app name"),
# Setup-tab default-state not bumped.
appId: com.ethora.SDKPlayground
env:
  APPB_BASE_URL: ${MAESTRO_TEST_APPB_BASE_URL}
  APPB_APP_ID: ${MAESTRO_TEST_APPB_APP_ID}
  APPB_APP_TOKEN: ${MAESTRO_TEST_APPB_APP_TOKEN}
  APPB_EMAIL: ${MAESTRO_TEST_APPB_EMAIL}
  APPB_PASSWORD: ${MAESTRO_TEST_APPB_PASSWORD}
---
- runFlow: 01-login-email.yaml
- tapOn: "Setup"
- tapOn: "Disconnect"
- tapOn:
    text: "Base URL"
- eraseText: 100
- inputText: ${APPB_BASE_URL}
- tapOn:
    text: "App ID"
- eraseText: 100
- inputText: ${APPB_APP_ID}
- tapOn:
    text: "App token"
- eraseText: 200
- inputText: ${APPB_APP_TOKEN}
- tapOn:
    text: "Email"
- eraseText: 100
- inputText: ${APPB_EMAIL}
- tapOn:
    text: "Password"
- eraseText: 100
- inputText: ${APPB_PASSWORD}
- tapOn: "Connect"
- extendedWaitUntil:
    visible: "Connected"
    timeout: 15000
- tapOn: "Chat"
- assertNotVisible: "maestro hello"
