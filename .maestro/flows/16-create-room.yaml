# Create a new MUC room via the toolbar "+" button. Catches:
# create-room RPC failing silently while UI shows the new tile,
# room not bootstrapping XMPP presence on first send, JID
# generation collision on a duplicate name.
appId: com.ethora.SDKPlayground
env:
  ROOM_NAME: "Maestro Room ${EPOCH}"
---
- runFlow: 03-list-rooms.yaml
- tapOn:
    id: "create_room_button"
- assertVisible:
    text: "New chat"
    optional: true
- tapOn:
    text: "Room name"
    optional: true
- inputText: ${ROOM_NAME}
- tapOn:
    text: "Create"
- extendedWaitUntil:
    visible: ${ROOM_NAME}
    timeout: 10000
- tapOn: ${ROOM_NAME}
- tapOn:
    id: "chat_input"
- inputText: "first message in new room"
- tapOn:
    id: "chat_send_button"
- extendedWaitUntil:
    visible: "first message in new room"
    timeout: 5000
