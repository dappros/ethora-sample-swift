# Rapid-fire send of 5 messages. Catches: send-queue reorder bugs,
# optimistic UI dropping bubbles when acks arrive out of order, XMPP
# rate-limiting collapsing identical timestamps, ChatInputView
# debouncing eating the second tap.
appId: com.ethora.SDKPlayground
env:
  PREFIX: "rapid-${EPOCH}"
---
- runFlow: 03-list-rooms.yaml
- tapOnFirst:
    id: "room_row"
- tapOn:
    id: "chat_input"
- inputText: "${PREFIX}-1"
- tapOn:
    id: "chat_send_button"
- tapOn:
    id: "chat_input"
- inputText: "${PREFIX}-2"
- tapOn:
    id: "chat_send_button"
- tapOn:
    id: "chat_input"
- inputText: "${PREFIX}-3"
- tapOn:
    id: "chat_send_button"
- tapOn:
    id: "chat_input"
- inputText: "${PREFIX}-4"
- tapOn:
    id: "chat_send_button"
- tapOn:
    id: "chat_input"
- inputText: "${PREFIX}-5"
- tapOn:
    id: "chat_send_button"
- extendedWaitUntil:
    visible: "${PREFIX}-1"
    timeout: 20000
- assertVisible: "${PREFIX}-2"
- assertVisible: "${PREFIX}-3"
- assertVisible: "${PREFIX}-4"
- assertVisible: "${PREFIX}-5"
