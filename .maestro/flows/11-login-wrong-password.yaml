# Negative login path — wrong password produces a visible error,
# the form stays editable, no spurious "Connected" appears.
# Catches: error response not surfaced to UI, retry loop on 401,
# accidental login under a stale cached token.
appId: com.ethora.SDKPlayground
env:
  EMAIL: ${MAESTRO_TEST_EMAIL:-alice@ethora.com}
  WRONG_PASSWORD: "definitely-not-the-password-${EPOCH}"
---
- launchApp:
    clearState: true
- tapOn: "Setup"
- tapOn:
    text: "Email"
- inputText: ${EMAIL}
- tapOn:
    text: "Password"
- inputText: ${WRONG_PASSWORD}
- tapOn: "Connect"
- extendedWaitUntil:
    visible: "Login failed"
    timeout: 10000
- assertNotVisible: "Connected"
- assertVisible:
    text: "Connect"
